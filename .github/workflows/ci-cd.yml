name: CI/CD FlowGuard

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Build backend
        run: mvn -f backend/pom.xml clean package -DskipTests

  build-ml-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd ml-service
          # timesfm[torch] is ~500MB and CPU-only inference — skip in CI, installed in Docker
          grep -v '^timesfm' requirements.txt | pip install -r /dev/stdin
      - name: Run tests
        run: |
          cd ml-service
          pytest

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd mobile
          npm install --legacy-peer-deps
      - name: Type check
        run: |
          cd mobile
          npx tsc --noEmit
      - name: Lint
        run: |
          cd mobile
          npm run lint

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd web
          npm ci --legacy-peer-deps
      - name: Type check
        run: |
          cd web
          npx tsc --noEmit
      - name: Build
        run: |
          cd web
          npm run build

  deploy:
    needs: [build-backend, build-ml-service, build-mobile, build-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /opt/flowguard
            git fetch --all
            git reset --hard origin/main
            bash infra/deploy.sh
