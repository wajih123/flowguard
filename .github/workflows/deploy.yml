name: Deploy to Production

# Disabled — deployment is handled by ci-cd.yml (runs after CI passes)
# To trigger manually: Actions → Deploy to Production → Run workflow
on:
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          command_timeout: 25m
          envs: ENCRYPTION_KEY
          script: |
            set -euo pipefail
            cd /opt/flowguard
            git fetch --all
            git reset --hard origin/main
            # Inject secrets from GitHub into .env.prod (values never stored in git)
            sed -i "s|^ENCRYPTION_KEY=.*|ENCRYPTION_KEY=${ENCRYPTION_KEY}|" infra/.env.prod
            bash infra/deploy.sh
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
