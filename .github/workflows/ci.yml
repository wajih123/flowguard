name: CI — Build, Test & Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1" # Weekly CVE scan every Monday 06:00 UTC

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/flowguard-backend
  IMAGE_ML: ghcr.io/${{ github.repository_owner }}/flowguard-ml-service
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/flowguard-web

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — Build + Test
  # ─────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Quarkus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn test -B -q

  # ─────────────────────────────────────────────────────────────────────────────
  # ML Service — Lint
  # ─────────────────────────────────────────────────────────────────────────────
  ml-lint:
    name: ML Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        working-directory: ml-service
        run: ruff check .

  # ─────────────────────────────────────────────────────────────────────────────
  # Build Docker Images
  # ─────────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, ml-lint]
    permissions:
      contents: read
      security-events: write # required to upload SARIF results
    outputs:
      backend-digest: ${{ steps.build-backend.outputs.digest }}
      ml-digest: ${{ steps.build-ml.outputs.digest }}
      web-digest: ${{ steps.build-web.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          load: true
          tags: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ML service image
        id: build-ml
        uses: docker/build-push-action@v5
        with:
          context: ml-service
          push: false
          load: true
          tags: ${{ env.IMAGE_ML }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        id: build-web
        uses: docker/build-push-action@v5
        with:
          context: web
          push: false
          load: true
          tags: ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy Security Scanning ─────────────────────────────────────────────
      # Scans for CVEs in OS packages and application dependencies.
      # CRITICAL/HIGH severities will fail the build (security gate).

      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan — ml-service
        if: always() # run even if backend scan found vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_ML }}:${{ github.sha }}
          format: "sarif"
          output: "trivy-ml.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan — web
        if: always() # run even if a previous scan found vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_WEB }}:${{ github.sha }}
          format: "sarif"
          output: "trivy-web.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload backend Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload ML service Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-ml.sarif
          category: trivy-ml

      - name: Upload web Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

      # ── Push images (main branch only, after passing scans) ─────────────────

      - name: Push backend image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha

      - name: Push ML service image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ml-service
          push: true
          tags: |
            ${{ env.IMAGE_ML }}:${{ github.sha }}
            ${{ env.IMAGE_ML }}:latest
          cache-from: type=gha

      - name: Push web image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: web
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
            ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha

  # ─────────────────────────────────────────────────────────────────────────────
  # Weekly Trivy scan on latest images (scheduled)
  # ─────────────────────────────────────────────────────────────────────────────
  trivy-scheduled:
    name: Scheduled CVE Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Trivy scan — backend:latest
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:latest
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0" # Don't fail scheduled scan — just report
