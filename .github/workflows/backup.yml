name: Scheduled Database Backup

on:
  schedule:
    # Daily backup at 02:00 UTC
    - cron: "0 2 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print what would be done, do not upload)"
        required: false
        default: "false"

jobs:
  backup:
    name: PostgreSQL Backup → Hetzner Object Storage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y postgresql-client s3cmd

      - name: Run backup script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || '5432' }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME || 'flowguard' }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          BACKUP_GPG_KEY_ID: ${{ secrets.BACKUP_GPG_KEY_ID }}
        run: |
          chmod +x backend/scripts/backup.sh
          ./backend/scripts/backup.sh ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Database backup failed — ' + new Date().toISOString().split('T')[0],
              body: `The scheduled database backup failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n**Action required:** Check the run logs and resolve immediately. Data protection requires valid backups.`,
              labels: ['incident', 'backup', 'critical']
            })
