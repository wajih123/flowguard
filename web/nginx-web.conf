server {
    listen 80;
    server_tokens off;               # Don't advertise nginx version
    root /usr/share/nginx/html;
    index index.html;

    keepalive_timeout 65;            # Reuse TCP connections across requests

    # React SPA: forward all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: aggressive cache + serve pre-compressed files when present
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;              # Serve .gz files produced by the build step
        try_files $uri =404;
    }

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;               # Level 1 (default) → 6: ~30% smaller, ~2% more CPU
    gzip_proxied any;                # Compress responses for proxied requests too
    gzip_buffers 16 8k;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/font-woff2
        image/svg+xml;
    gzip_min_length 1024;
}
