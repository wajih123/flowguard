name: flowguard # Explicit project name so Docker networks are predictably flowguard_internal / flowguard_external
services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: flowguard-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - internal

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flowguard-redis
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ── Quarkus Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: flowguard-backend:latest
    container_name: flowguard-backend
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUARKUS_HTTP_CORS_ORIGINS: ${CORS_ORIGINS}
      BRIDGE_CLIENT_ID: ${BRIDGE_CLIENT_ID}
      BRIDGE_CLIENT_SECRET: ${BRIDGE_CLIENT_SECRET}
      BRIDGE_REDIRECT_URL: ${BRIDGE_REDIRECT_URL}
      BRIDGE_WEBHOOK_SECRET: ${BRIDGE_WEBHOOK_SECRET}
      FLOWGUARD_ML_SERVICE_URL: http://ml-service:8000
      FLOWGUARD_ALERT_CRON: ${FLOWGUARD_ALERT_CRON:-0 0 * * * ?}
      FLOWGUARD_SWAN_CLIENT_ID: ${FLOWGUARD_SWAN_CLIENT_ID:-placeholder}
      FLOWGUARD_SWAN_CLIENT_SECRET: ${FLOWGUARD_SWAN_CLIENT_SECRET:-placeholder}
      SMALLRYE_JWT_SIGN_KEY_LOCATION: file:/app/keys/privateKey.pem
      MP_JWT_VERIFY_PUBLICKEY_LOCATION: file:/app/keys/publicKey.pem
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      QUARKUS_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      # Email OTP (2FA)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    volumes:
      - /opt/flowguard/keys:/app/keys:ro # bind mount — avoids Docker volume ownership warning
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Health endpoint is NOT under root-path=/api
      # Quarkus health is served at /health (configured by quarkus.smallrye-health.root-path)
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    # Limit JVM to 768 MB on the 4 GB Hetzner CAX11
    mem_limit: 768m
    restart: unless-stopped
    networks:
      - internal

  # ── FastAPI ML Service ────────────────────────────────────────────────────────
  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    image: flowguard-ml:latest
    container_name: flowguard-ml
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      APP_ENV: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'', timeout=3)" || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    # PyTorch + TimesFM require ~1.5 GB; cap here to protect other services
    mem_limit: 1536m
    restart: unless-stopped
    networks:
      - internal

  # ── React Web Frontend ───────────────────────────────────────────────────────
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "" # empty = relative URLs, nginx routes /api/* to backend
    image: flowguard-web:latest
    container_name: flowguard-web
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: flowguard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/app.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- https://127.0.0.1/health-check --no-check-certificate 2>&1 | grep -q ok || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - internal
      - external

  # ── Certbot (SSL renew) ───────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: flowguard-certbot
    volumes:
      - certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Only runs when called manually or via cron: docker compose run --rm certbot renew
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certs:
  certbot_www:
