version: "3.9"

services:
  backend:
    build: ../backend
    container_name: flowguard-backend
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_PROFILE=prod
      # Quarkus datasource — must match application.properties env var names
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db:5432/flowguard
      - QUARKUS_DATASOURCE_USERNAME=flowguard
      - QUARKUS_DATASOURCE_PASSWORD=flowguard
      # Redis — no password on the infra Redis service
      - QUARKUS_REDIS_HOSTS=redis://redis:6379
      - QUARKUS_REDIS_PASSWORD=
      # ML Service
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - db
      - redis
      - ml-service
    restart: always

  ml-service:
    build: ../ml-service
    container_name: flowguard-ml-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://flowguard:flowguard@db:5432/flowguard
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:16
    container_name: flowguard-db
    environment:
      - POSTGRES_DB=flowguard
      - POSTGRES_USER=flowguard
      - POSTGRES_PASSWORD=flowguard
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: flowguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  nginx:
    image: nginx:stable
    container_name: flowguard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt
      - static:/var/www/flowguard
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
  redis_data:
  certs:
  static:
