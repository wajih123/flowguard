# ─────────────────────────────────────────────────────────────────────────────
# FlowGuard — Nginx HTTPS config (Phase 2 — after domain + certbot setup)
# Activated by infra/enable-https.sh — DO NOT use before SSL certs are ready
# ─────────────────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name 157-180-43-233.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name 157-180-43-233.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/157-180-43-233.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/157-180-43-233.sslip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                           always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header Referrer-Policy           strict-origin-when-cross-origin                always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss://157-180-43-233.sslip.io https://api.bridgeapi.io;"
        always;

    # Internal health check
    location = /health-check {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # WebSocket — must be listed before /api/ to take priority
    location /api/ws/ {
        proxy_pass          http://backend:8080/api/ws/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400s;
    }

    # Banking sync — Bridge API calls can take up to 2 min
    location /api/banking/ {
        proxy_pass         http://backend:8080/api/banking/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Quarkus internal endpoints — blocked from public
    location /q/ {
        deny all;
    }

    # React SPA (everything else)
    location / {
        proxy_pass       http://web:80/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
