# ─────────────────────────────────────────────────────────────────────────────
# FlowGuard — Nginx reverse proxy
# Phase 1 (HTTP only, IP access):  this file is used as-is
# Phase 2 (HTTPS + domain):        run infra/enable-https.sh to switch
# ─────────────────────────────────────────────────────────────────────────────

# Shared proxy headers
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP server ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (used by certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Internal health check (used by Docker healthcheck)
    location = /health-check {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass          http://backend:8080/ws/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400s;
    }

    # Quarkus health/metrics (restrict to internal — expose only on localhost)
    location /q/ {
        allow  127.0.0.1;
        deny   all;
        proxy_pass http://backend:8080/q/;
    }

    # React SPA (everything else)
    location / {
        proxy_pass       http://web:80/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

