version: "3.9"

# ============================================================
# FlowGuard — Monitoring Stack
# Prometheus + Grafana + Alertmanager + Loki + Promtail
# ============================================================
# Usage:
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.monitoring.yml up -d
#
# Required env vars (set in .env or server environment):
#   GRAFANA_PASSWORD        — Grafana admin password
#   GRAFANA_ROOT_URL        — e.g. https://monitoring.flowguard.fr
#   ALERTMANAGER_URL        — e.g. https://alertmanager.flowguard.fr
#   DB_PASSWORD             — PostgreSQL password
#
# Access (via SSH tunnel or nginx reverse proxy only):
#   Grafana:      http://127.0.0.1:3001  → expose via nginx at /grafana
#   Prometheus:   http://127.0.0.1:9090  → internal only
#   Alertmanager: http://127.0.0.1:9093  → internal only
#
# Security: exporters have NO host ports — Prometheus scrapes them
# via the Docker bridge network directly.
# ============================================================

networks:
  monitoring:
    driver: bridge
  flowguard_internal:
    external: true # connects to the main docker-compose network

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

services:
  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: flowguard-prometheus
    restart: unless-stopped
    networks: [monitoring, flowguard_internal]
    ports:
      - "127.0.0.1:9090:9090" # loopback only — access via SSH tunnel or nginx
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.enable-admin-api

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: flowguard-grafana
    restart: unless-stopped
    networks: [monitoring, flowguard_internal] # flowguard_internal so nginx can proxy /grafana/
    ports:
      - "127.0.0.1:3001:3000" # loopback only — expose via nginx reverse proxy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD required}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:?GRAFANA_ROOT_URL required (e.g. https://monitoring.flowguard.fr)}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: flowguard-alertmanager
    restart: unless-stopped
    networks: [monitoring, flowguard_internal] # flowguard_internal so nginx can proxy /alertmanager/
    ports:
      - "127.0.0.1:9093:9093" # loopback only
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=${ALERTMANAGER_URL:?ALERTMANAGER_URL required (e.g. https://alertmanager.flowguard.fr)}
      - --config.expand-env=true # allows ${VAR} substitution in alertmanager.yml

  # ── Loki (log aggregation) ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.6
    container_name: flowguard-loki
    restart: unless-stopped
    networks: [monitoring]
    # No host port — Grafana and Promtail reach Loki via Docker network
    expose:
      - "3100"
    volumes:
      - loki_data:/loki
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml

  # ── Promtail (log shipper for backend) ─────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.6
    container_name: flowguard-promtail
    restart: unless-stopped
    networks: [monitoring, flowguard_internal]
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # ── Postgres Exporter ───────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: flowguard-postgres-exporter
    restart: unless-stopped
    networks: [monitoring, flowguard_internal]
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-flowguard}:${DB_PASSWORD:?DB_PASSWORD required}@postgres:5432/${DB_NAME:-flowguard}?sslmode=disable"
    # No host port — Prometheus scrapes via Docker network

  # ── Redis Exporter ──────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: flowguard-redis-exporter
    restart: unless-stopped
    networks: [monitoring, flowguard_internal]
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    # No host port — Prometheus scrapes via Docker network

  # ── Node Exporter (host metrics) ────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: flowguard-node-exporter
    restart: unless-stopped
    networks: [monitoring]
    # No host port — Prometheus scrapes via Docker network
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

  # ── cAdvisor (container-level metrics) ─────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: flowguard-cadvisor
    restart: unless-stopped
    networks: [monitoring, flowguard_internal]
    # No host port — Prometheus scrapes via Docker network
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg

  # ── Blackbox Exporter (HTTP endpoint probing) ────────────────────────────────
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: flowguard-blackbox
    restart: unless-stopped
    networks: [monitoring, flowguard_internal]
    # No host port — Prometheus scrapes via Docker network
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  # ── Nginx Prometheus Exporter (reverse-proxy metrics) ───────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: flowguard-nginx-exporter
    restart: unless-stopped
    networks: [monitoring, flowguard_internal]
    # No host port — Prometheus scrapes via Docker network
    command:
      - --nginx.scrape-uri=http://nginx/nginx_status
    depends_on:
      - blackbox-exporter
