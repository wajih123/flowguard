# ZAP config — suppress false positives for FlowGuard API
# https://www.zaproxy.org/docs/docker/baseline-scan/

# Suppress: X-Content-Type-Options false positive (already set by SecurityHeadersFilter)
# These are informational rules that don't represent actual vulnerabilities

# 10015 - Incomplete or No Cache-control Header Set (handled by SecurityHeadersFilter)
10015	IGNORE	(Ignore cache-control — handled by SecurityHeadersFilter)

# 10027 - Information Disclosure - Suspicious Comments
10027	IGNORE	(Dev comments in OpenAPI spec are not sensitive)

# 90003 - Sub Resource Integrity Attribute Missing (N/A for API endpoints)
90003	IGNORE	(SRI not applicable to JSON API)
