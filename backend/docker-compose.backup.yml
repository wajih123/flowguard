version: "3.9"

# FlowGuard — Automated Database Backup Service
# BCP/DRP: Daily backups to Hetzner Object Storage with 30-day retention
#
# Usage (extends docker-compose.prod.yml):
#   docker compose -f docker-compose.prod.yml -f docker-compose.backup.yml up -d
#
# Or run a one-off backup:
#   docker compose -f docker-compose.backup.yml run --rm db-backup

services:
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - backup_tmp:/tmp/flowguard-backup
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-flowguard}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-flowguard}
      S3_BUCKET: ${S3_BUCKET:-flowguard-backups}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      BACKUP_GPG_KEY_ID: ${BACKUP_GPG_KEY_ID:-}
      # Retention: 30 days on S3 (managed by backup.sh prune_old_backups)
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    entrypoint: >
      sh -c "
        apk add --no-cache s3cmd gpg gpg-agent &&
        chmod +x /scripts/backup.sh &&
        while true; do
          echo \"=== Starting backup at \$$(date) ===\"
          /scripts/backup.sh || echo \"ERROR: Backup failed at \$$(date)\"
          echo \"=== Next backup in 24h ===\"
          sleep 86400
        done
      "
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "find /tmp/flowguard-backup -name '*.sql.gz' -newer /tmp/.last_backup_check 2>/dev/null | grep -q .",
        ]
      interval: 1h
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  backup_tmp:

networks:
  backend:
    external: true
