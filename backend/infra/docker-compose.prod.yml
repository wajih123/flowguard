name: flowguard

# ============================================================
# FlowGuard — Production Stack
# Usage:  docker compose -f infra/docker-compose.prod.yml --env-file .env up -d
# ============================================================

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certs:
  certbot_www:

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: flowguard-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks: [internal]
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flowguard-redis
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [internal]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Quarkus Backend ───────────────────────────────────────────────────────────
  backend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-nevyo}/flowguard-backend:${DOCKER_TAG:-latest}
    container_name: flowguard-backend
    environment:
      # Database
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      # Redis — both naming styles for compatibility
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      QUARKUS_REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # JWT keys — override application.properties classpath location with file path
      MP_JWT_VERIFY_PUBLICKEY_LOCATION: file:/app/keys/publicKey.pem
      SMALLRYE_JWT_SIGN_KEY_LOCATION: file:/app/keys/privateKey.pem

      # CORS
      QUARKUS_HTTP_CORS_ORIGINS: ${CORS_ORIGINS:-https://157-180-43-233.sslip.io}

      # Bridge API
      BRIDGE_CLIENT_ID: ${BRIDGE_CLIENT_ID}
      BRIDGE_CLIENT_SECRET: ${BRIDGE_CLIENT_SECRET}
      BRIDGE_REDIRECT_URL: ${BRIDGE_REDIRECT_URL:-https://157-180-43-233.sslip.io/banking/callback}
      BRIDGE_WEBHOOK_SECRET: ${BRIDGE_WEBHOOK_SECRET:-}

      # ML Service — both naming styles for compatibility
      ML_SERVICE_URL: http://ml-service:8000
      FLOWGUARD_ML_SERVICE_URL: http://ml-service:8000

      # Schedulers
      FLOWGUARD_ALERT_CRON: ${FLOWGUARD_ALERT_CRON:-0 0/5 * * * ?}

      # Security
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # Firebase push notifications (optional)
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-{}}

      # Swan (optional)
      FLOWGUARD_SWAN_CLIENT_ID: ${FLOWGUARD_SWAN_CLIENT_ID:-}
      FLOWGUARD_SWAN_CLIENT_SECRET: ${FLOWGUARD_SWAN_CLIENT_SECRET:-}

      # Email OTP
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}

      # Skip Flyway validation mismatch errors (safe — we manage migrations explicitly)
      QUARKUS_FLYWAY_VALIDATE_ON_MIGRATE: "false"

    volumes:
      - /opt/flowguard/keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/q/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    mem_limit: 768m
    restart: unless-stopped
    networks: [internal]
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "10" }

  # ── FastAPI ML Service ────────────────────────────────────────────────────────
  ml-service:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-nevyo}/flowguard-ml:${DOCKER_TAG:-latest}
    container_name: flowguard-ml
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      APP_ENV: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 1536m
    restart: unless-stopped
    networks: [internal]
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  # ── React Web Frontend ───────────────────────────────────────────────────────
  web:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-nevyo}/flowguard-web:${DOCKER_TAG:-latest}
    container_name: flowguard-web
    restart: unless-stopped
    networks: [internal]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: flowguard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/app.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/health-check 2>&1 | grep -q ok || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks: [internal, external]
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  # ── Certbot (SSL renew) ───────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: flowguard-certbot
    volumes:
      - certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }
