# ============================================================
# FlowGuard — Nginx Reverse Proxy (Production — sslip.io TLS)
# Routes traffic to the backend API and the frontend SPA.
#
# /api/*          → backend:8080 (Quarkus, root-path=/api)
# /api/ws/*       → backend:8080 (WebSocket upgrade)
# /               → frontend:8080 (React SPA)
# /health         → 200 OK (proxy liveness probe)
# /nginx_status   → stub_status (Prometheus exporter — internal only)
#
# TLS cert managed by Certbot — stored in letsencrypt_certs volume.
# To renew manually: docker compose run --rm certbot renew
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" '
                    'rt=$request_time '
                    'uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" '
                    'urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;

    # ── Rate limiting — protect API from abuse ────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # ── Upstream: Backend API (Quarkus on port 8080) ──────────────────────────
    upstream backend {
        server backend:8080;
        keepalive 32;
    }

    # ── Upstream: Frontend SPA (nginx-static on port 8080) ────────────────────
    upstream frontend {
        server frontend:8080;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect + Let's Encrypt ACME challenge ─────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name 157-180-43-233.sslip.io;

        # Certbot webroot challenge — served from shared volume
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — Main application server ──────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name 157-180-43-233.sslip.io;

        # ── TLS (Let's Encrypt via Certbot) ───────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/157-180-43-233.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/157-180-43-233.sslip.io/privkey.pem;

        # Mozilla "Intermediate" profile (TLS 1.2 + 1.3, broad compatibility)
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;
        ssl_stapling         on;
        ssl_stapling_verify  on;
        resolver             1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout     5s;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Proxy liveness endpoint ───────────────────────────────────────────
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # ── Nginx stub_status (Prometheus exporter — Docker networks only) ────
        location = /nginx_status {
            stub_status on;
            access_log off;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }

        # ── WebSocket: backend real-time alerts ───────────────────────────────
        location /api/ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── Backend REST API ──────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout  5s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            proxy_next_upstream         error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries   3;
            proxy_next_upstream_timeout 30s;

            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      4 32k;
        }

        # ── Auth endpoints: tighter rate limit ───────────────────────────────
        location ~ ^/api/(auth/login|auth/register) {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' wss: https:; frame-ancestors 'none';" always;
        }
    }
}


