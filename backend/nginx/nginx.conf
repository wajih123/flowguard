# ============================================================
# FlowGuard — Nginx Reverse Proxy
# Routes traffic to the backend API and the frontend SPA.
#
# /api/*          → backend:8080 (Quarkus, root-path=/api)
# /api/ws/*       → backend:8080 (WebSocket upgrade)
# /               → frontend:8080 (React SPA)
# /health         → 200 OK (proxy liveness probe)
# /nginx_status   → stub_status (Prometheus exporter — internal only)
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" '
                    'rt=$request_time '
                    'uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" '
                    'urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Upstream: Backend API (Quarkus on port 8080) ──────────────────────────
    # keepalive reuses connections for throughput under load.
    upstream backend {
        server backend:8080;
        keepalive 32;
    }

    # ── Upstream: Frontend SPA (nginx-static on port 8080) ────────────────────
    upstream frontend {
        server frontend:8080;
        keepalive 16;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ── Proxy liveness endpoint (used by Docker healthcheck) ──────────────
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # ── Nginx stub_status (Prometheus exporter scrapes this) ──────────────
        # Restricted to Docker bridge networks only — never exposed to the internet.
        location = /nginx_status {
            stub_status on;
            access_log off;
            allow 172.16.0.0/12;   # Docker bridge ranges
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }

        # ── WebSocket: backend real-time alerts ───────────────────────────────
        # Must be matched before the generic /api/ block because WebSocket
        # requires different proxy headers (Upgrade / Connection).
        location /api/ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout  3600s;   # keep WebSocket alive for 1 hour
            proxy_send_timeout  3600s;
        }

        # ── Backend REST API ──────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;

            # Connection & header reuse
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Pass real client context to the backend
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts — increased to accommodate long-running Quarkus operations
            # (Bridge API sync can run up to ~2 min per application.properties)
            proxy_connect_timeout  5s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # Retry on upstream errors for idempotent failures.
            # Only GET-safe methods are retried automatically by nginx.
            proxy_next_upstream         error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries   3;
            proxy_next_upstream_timeout 30s;

            # Response buffering — keep enabled so slow clients don't hold
            # backend connections open.
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      4 32k;
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Security headers for the SPA
            # Allow Google Fonts (used for DM Sans, Inter, DM Mono)
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' wss: https:; frame-ancestors 'none';" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
        }
    }
}
