server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs ──────────────────────────────────────────────────
  # Tails JSON log files written by Docker's json-file driver.
  # Labels are extracted automatically from Docker container metadata.
  - job_name: docker-containers
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
            tag: attrs.tag
      - json:
          source: tag
          expressions:
            container_name: ""
      - regex:
          source: container_name
          expression: "^/(?P<service>[a-z0-9_-]+)"
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
          service:
      - output:
          source: output

  # ── Backend (Quarkus) structured JSON logs ─────────────────────────────────
  - job_name: flowguard-backend
    static_configs:
      - targets: [localhost]
        labels:
          job: flowguard-backend
          service: backend
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            attrs: attrs
      - json:
          source: attrs
          expressions:
            container: "com.docker.compose.service"
      - match:
          selector: '{job="flowguard-backend"}'
          pipeline_stages:
            - json:
                source: output
                expressions:
                  level: level
                  logger: logger
                  message: message
                  traceId: traceId
            - labels:
                level:
                logger:
      - output:
          source: output

  # ── System logs (auth, syslog) ─────────────────────────────────────────────
  - job_name: syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          __path__: /var/log/syslog

  - job_name: auth-log
    static_configs:
      - targets: [localhost]
        labels:
          job: auth
          __path__: /var/log/auth.log
