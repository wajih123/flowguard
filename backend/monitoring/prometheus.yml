global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    service: flowguard

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: flowguard-backend
    metrics_path: /api/metrics
    static_configs:
      - targets: [backend:8080]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: flowguard-backend

  - job_name: flowguard-ml-service
    metrics_path: /metrics
    static_configs:
      - targets: [ml-service:8000]

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
