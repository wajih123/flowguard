global:
  resolve_timeout: 5m
  smtp_from: alerts@flowguard.fr
  smtp_smarthost: ${SMTP_HOST:-smtp.sendgrid.net}:587
  smtp_auth_username: apikey
  smtp_auth_password: ${SMTP_API_KEY}
  slack_api_url: ${SLACK_WEBHOOK_URL} # set in environment / secrets

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical-pagerduty
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: email-team

receivers:
  - name: default
    email_configs:
      - to: tech@flowguard.fr
        send_resolved: true
    slack_configs:
      - channel: "#alerts"
        send_resolved: true
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] FlowGuard Alert'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: critical-pagerduty
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_ROUTING_KEY}
        send_resolved: true
    email_configs:
      - to: tech@flowguard.fr
        send_resolved: true
    slack_configs:
      - channel: "#incidents"
        send_resolved: true
        title: "🚨 CRITICAL: {{ .Alerts.Firing | len }} alert(s) firing"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        color: danger

  - name: email-team
    email_configs:
      - to: tech@flowguard.fr
        send_resolved: true
    slack_configs:
      - channel: "#alerts"
        send_resolved: true
        title: "[WARNING] {{ .Alerts.Firing | len }} alert(s)"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          {{ end }}
        color: warning

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
