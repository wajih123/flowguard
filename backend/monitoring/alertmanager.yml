global:
  resolve_timeout: 5m
  smtp_from: alerts@flowguard.fr
  smtp_smarthost: ${SMTP_HOST:-smtp.sendgrid.net}:587
  smtp_auth_username: apikey
  smtp_auth_password: ${SMTP_API_KEY}

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical-pagerduty
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: email-team

receivers:
  - name: default
    email_configs:
      - to: tech@flowguard.fr
        send_resolved: true

  - name: critical-pagerduty
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_ROUTING_KEY}
        send_resolved: true
    email_configs:
      - to: tech@flowguard.fr
        send_resolved: true

  - name: email-team
    email_configs:
      - to: tech@flowguard.fr
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
