# ─────────────────────────────────────────────────────────────────────────────
# CI — Test → Build → Push
#
# Gate logic (proper order, no broken images on Docker Hub):
#   1. Tests run in parallel (backend / web / ml-service)
#   2. Each image is built ONLY if its own tests pass
#   3. deploy.yml triggers ONLY when this workflow succeeds
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  ORG: nevyo

jobs:
  # ── 1a. Test Backend ────────────────────────────────────────────────────────
  # Uses H2 in-memory DB (%test profile in application.properties) — no services needed.
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn verify -B -q

  # ── 1b. Test Web (TypeScript + Vite build) ───────────────────────────────────
  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      # npm run build = tsc && vite build — catches TS errors + bundler errors
      - name: TypeScript check + Vite build
        working-directory: web
        run: npm run build

  # ── 1c. Test ML Service ──────────────────────────────────────────────────────
  # Tests are self-contained (no external DB/Redis required per test file headers).
  test-ml:
    name: Test ML Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        working-directory: ml-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ml-service
        run: python -m pytest tests/ -q --tb=short

  # ── 2a. Build & Push Backend ─────────────────────────────────────────────────
  # Only runs if test-backend passed and we're on main (not a PR).
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/flowguard-backend
          tags: |
            type=sha,prefix=main-
            type=raw,value=latest

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Build & Push Web ───────────────────────────────────────────────────────
  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/flowguard-web
          tags: |
            type=sha,prefix=main-
            type=raw,value=latest

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Build & Push ML Service ───────────────────────────────────────────────
  build-ml:
    name: Build ML Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/flowguard-ml
          tags: |
            type=sha,prefix=main-
            type=raw,value=latest

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ml-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. CI Gate ───────────────────────────────────────────────────────────────
  # deploy.yml watches this job via workflow_run.
  # Succeeds when all 3 images are pushed to Docker Hub.
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [build-backend, build-web, build-ml]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Gate check
        run: |
          declare -A results=(
            [backend]="${{ needs.build-backend.result }}"
            [web]="${{ needs.build-web.result }}"
            [ml]="${{ needs.build-ml.result }}"
          )
          failed=0
          for svc in "${!results[@]}"; do
            if [[ "${results[$svc]}" != "success" ]]; then
              echo "❌ $svc failed (${results[$svc]})"
              failed=1
            else
              echo "✅ $svc OK"
            fi
          done
          [[ $failed -eq 0 ]] || exit 1
          echo ""
          echo "All images pushed to Docker Hub:"
          echo "  docker.io/nevyo/flowguard-backend:latest"
          echo "  docker.io/nevyo/flowguard-web:latest"
          echo "  docker.io/nevyo/flowguard-ml:latest"
