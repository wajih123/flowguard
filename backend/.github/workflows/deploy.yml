name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e
            cd /opt/flowguard
            git pull origin main
            bash infra/deploy.sh all

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          command_timeout: 2m
          script: |
            echo "=== Container Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep flowguard
            echo ""
            echo "=== Backend Health ==="
            curl -sf http://localhost:8080/health && echo "OK" || echo "FAILED"
            echo ""
            echo "=== Nginx ==="
            curl -sf http://localhost/health-check && echo "OK" || echo "FAILED"
