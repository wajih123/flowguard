# =============================================
# FlowGuard Backend — Quarkus 3.27 LTS
# =============================================

# --- Datasource (PostgreSQL 16) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:flowguard}
quarkus.datasource.password=${DB_PASSWORD:flowguard}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flowguard}
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5

# --- Hibernate ORM ---
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true

# --- Redis ---
quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
quarkus.redis.password=${REDIS_PASSWORD:}
quarkus.redis.max-pool-size=16
# Fail fast on Redis unavailability — prevents requests from hanging indefinitely
# when the Redis container is slow or under memory pressure
quarkus.redis.timeout=2s

# --- JWT / Security ---
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:publicKey.pem}
mp.jwt.verify.issuer=https://flowguard.fr
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:privateKey.pem}
smallrye.jwt.new-token.lifespan=900
smallrye.jwt.new-token.issuer=https://flowguard.fr

# --- CORS ---
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:8081,http://localhost:19006}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,X-Requested-With
quarkus.http.cors.exposed-headers=Location,X-Total-Count
quarkus.http.cors.access-control-max-age=24H

# --- HTTP ---
quarkus.http.port=${HTTP_PORT:8080}
quarkus.http.root-path=/api
quarkus.http.limits.max-body-size=10M

# --- ML Service ---
flowguard.ml-service.url=${ML_SERVICE_URL:http://localhost:8000}
flowguard.ml-service.timeout=30s

# --- Transaction Manager ---
# Bridge API sync can take up to ~2 min for users with many accounts/transactions
quarkus.transaction-manager.default-transaction-timeout=300

# --- Bridge API (v3 aggregation) ---
bridge.api-url=${BRIDGE_API_URL:https://api.bridgeapi.io}
bridge.version=2025-01-15
bridge.client-id=${BRIDGE_CLIENT_ID:sandbox_1d_8854ed19940c493faeec55080d2bd98b}
bridge.client-secret=${BRIDGE_CLIENT_SECRET:sandbox_secret_RImj9XJpPjl4vQIEqcV1vjfAWyUlZOrAa035DdezpU75HAxdUHMCORMLRipmO0wS}
bridge.redirect-url=${BRIDGE_REDIRECT_URL:http://localhost:5173/banking/callback}
bridge.webhook-secret=${BRIDGE_WEBHOOK_SECRET:}

# --- Redis TTL ---
redis.ttl.default=3600

# --- Firebase Push Notifications ---
# Optional: if not set, push notifications are disabled
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# --- Encryption (AES-256-GCM for sensitive fields) ---
encryption.key=${ENCRYPTION_KEY:}

# --- Scheduler ---
flowguard.forecast.cron=${FORECAST_CRON:0 0 6 * * ?}
flowguard.alert.cron=${ALERT_CRON:0 0 */4 * * ?}

# --- Logging ---
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.level=INFO
quarkus.log.category."fr.flowguard".level=DEBUG

# --- Health & Metrics ---
quarkus.smallrye-health.root-path=/health

# --- OpenAPI / Swagger ---
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# --- Dev Profile Overrides ---
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.flyway.migrate-at-start=false
%dev.quarkus.log.category."fr.flowguard".level=DEBUG

# --- Mailer (SMTP) ---
# In production set SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD as env vars.
# Mailjet / OVH / SendGrid all work with STARTTLS on port 587.
quarkus.mailer.from=noreply@flowguard.fr
quarkus.mailer.host=${SMTP_HOST:localhost}
quarkus.mailer.port=${SMTP_PORT:587}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${SMTP_USER:}
quarkus.mailer.password=${SMTP_PASSWORD:}
# Dev: intercept all mail — no real SMTP needed
%dev.quarkus.mailer.mock=true

# --- Test Profile Overrides ---
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.migrate-at-start=false
