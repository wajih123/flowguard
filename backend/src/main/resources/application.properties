# ── Application ───────────────────────────────────────────
quarkus.application.name=flowguard-backend
quarkus.http.port=8080

# ── Datasource ────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
# Port 5433 car on utilise Docker sur ce port pour éviter
# le conflit avec le PostgreSQL installé localement
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5433/flowguard_dev}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:flowguard}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:flowguard_dev_password}
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# ── Flyway ────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true

# ── Hibernate ─────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none
%dev.quarkus.hibernate-orm.log.sql=false

# ── Redis ─────────────────────────────────────────────────
quarkus.redis.hosts=${QUARKUS_REDIS_HOSTS:redis://localhost:6379}
quarkus.redis.password=${QUARKUS_REDIS_PASSWORD:flowguard_dev_redis}
quarkus.redis.timeout=5s

# ── JWT ───────────────────────────────────────────────────
mp.jwt.verify.issuer=https://flowguard.fr
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem

# ── CORS ──────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,idempotency-key,x-accountant-token
quarkus.http.cors.access-control-max-age=24H

# ── Swagger ───────────────────────────────────────────────
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.smallrye-openapi.info-title=FlowGuard API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de prévision de trésorerie FlowGuard

# ── Health ────────────────────────────────────────────────
quarkus.smallrye-health.ui.always-include=true

# ── Logs ──────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."fr.flowguard".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.color=true

# ── Mailer (OTP) dev = mode log uniquement ─────────────────
%dev.quarkus.mailer.mock=true

# ── Tests ─────────────────────────────────────────────────
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.mailer.mock=true

# -- Bridge API --------------------------------------------
quarkus.rest-client."bridge-api".url=https://api.bridgeapi.io
bridge.client-id=${BRIDGE_CLIENT_ID:sandbox_id_8854ed19940c493faeec55080d2bd98b}
bridge.client-secret=${BRIDGE_CLIENT_SECRET:sandbox_secret_RImj9XJpPjl4vQIEqcV1vjfAWyUlZOrAa035DdezpU75HAxdUHMCORMLRipmO0wS}
bridge.redirect-url=${BRIDGE_REDIRECT_URL:http://localhost:3000/banking/callback}
bridge.mock-mode=false

# Used by TreasuryService and TransactionService — matches flowguard.ml-service.url config key
flowguard.ml-service.url=${ML_SERVICE_URL:http://localhost:8001}
# Legacy alias (kept for backwards compatibility)
ml.service.url=${ML_SERVICE_URL:http://localhost:8001}

# ── AI-powered bank statement parser (Llama via Ollama) ──────────────────────
# Uses a local Llama 3.2 model served by Ollama for intelligent column detection
# (CSV/XLSX) and PDF text extraction. No API key required — Ollama is self-hosted.
# To disable AI and use heuristic-only parsers, set FLOWGUARD_AI_ENDPOINT to empty.
# Compatible with any OpenAI-compatible endpoint (Ollama, vLLM, llama.cpp server…)
flowguard.ai.endpoint=${FLOWGUARD_AI_ENDPOINT:http://ollama:11434/v1/chat/completions}
flowguard.ai.model=${FLOWGUARD_AI_MODEL:llama3.2:3b}
flowguard.ai.timeout-seconds=60

# ── Alert scheduler ────────────────────────────────────────────────────────────
# Runs every day at 08:00 to check treasury forecasts and spending patterns
flowguard.alert.cron=0 0 8 * * ?

# ── Spending pattern thresholds ────────────────────────────────────────────────
# EXCESSIVE_SPEND fires when today's total exceeds (daily average × multiplier)
flowguard.spending.daily-multiplier=2.0
# EXCESSIVE_SPEND fires on weekends when daily rate exceeds (weekend avg × multiplier)
flowguard.spending.weekend-multiplier=1.5
