# =============================================================
# FlowGuard — Test Profile (H2 in-memory, no external services)
# =============================================================

# --- Datasource: H2 in PostgreSQL-compat mode ---
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:flowguard_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH

# --- Hibernate DDL — let Hibernate create the schema from entities.
# Flyway migrations contain PostgreSQL-specific DDL (RLS, DO $$ blocks, pg_roles)
# that H2 cannot execute. Using drop-and-create avoids Flyway entirely for tests.
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false

# --- Redis: use Quarkus Dev Services (in-memory mock) ---
# Disables blocking on Redis availability so tests don't require a container
%test.quarkus.redis.devservices.enabled=false
%test.quarkus.redis.health.enabled=false

# --- JWT keys (reuse prod key paths — present in classpath) ---
%test.mp.jwt.verify.publickey.location=publicKey.pem
%test.smallrye.jwt.sign.key.location=privateKey.pem

# --- Disable external API calls in tests ---
%test.flowguard.sanctions.enabled=false
%test.flowguard.tracfin.enabled=false

# --- Mailer: mock mode (no real SMTP in tests) ---
%test.quarkus.mailer.mock=true

# --- Scheduler: disabled in tests ---
%test.quarkus.scheduler.enabled=false

# --- Firebase: empty key disables push notifications ---
%test.firebase.service-account-json=

# --- Static config carried from main (needed at startup) ---
%test.quarkus.http.root-path=/api
%test.bridge.api-url=http://localhost:9999
%test.bridge.client-id=test
%test.bridge.client-secret=test
%test.bridge.redirect-url=http://localhost:5173/banking/callback
%test.bridge.webhook-secret=test
%test.flowguard.ml-service.url=http://localhost:9999
