services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowguard
      POSTGRES_USER: flowguard
      POSTGRES_PASSWORD: flowguard_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      ML_HOST: ml-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ./mvnw quarkus:dev -Ddebug=5005 -Dquarkus.http.host=0.0.0.0

  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  adminer:
    image: adminer:4
    ports:
      - "8082:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
